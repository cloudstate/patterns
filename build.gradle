plugins {
  id 'application'
  id 'com.github.ben-manes.versions' version '0.53.0'
}

repositories {
  mavenCentral()
}

dependencies {
  implementation libs.jspecify
  
  testImplementation libs.assertj
}

testing {
  suites {
    test {
      useJUnitJupiter('5.12.1')
    }
  }
}

java {
  toolchain {
    languageVersion = JavaLanguageVersion.of(25)
  }
}

